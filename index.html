<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Fafiux</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, sans-serif;
    overflow:hidden;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.15);
}

h1{
    color:#ff4081;
    font-size:clamp(2rem,5vw,3rem);
    margin-bottom:15px;
}

p{
    color:#444;
    font-size:1.1rem;
    line-height:1.6;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    font-size:1rem;
    cursor:pointer;
}

.sorpresa{
    display:none;
}

.sorpresa img{
    width:100%;
    max-width:320px;
    border-radius:15px;
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="card">

    <div id="inicio">

        <h1>Feliz Cumpleaños Fafiux</h1>

        <p>
            Hoy es un día especial y quería prepararte algo
            para recordarte lo increíble que eres
        </p>

        <button onclick="abrirSorpresa()">
            Abrir sorpresa
        </button>

    </div>

    <div class="sorpresa" id="sorpresa">

       <img src="bng.png" alt="Foto de Fafiux">

        <h2>Para Fafiux</h2>

        <p>
           Felices 24 añacos <3
        </p>

    </div>

</div>

<audio id="musica" src="melan.m4a"></audio>

<script>

function abrirSorpresa(){

    document.getElementById("inicio").style.display = "none";
    document.getElementById("sorpresa").style.display = "block";

    const audio = document.getElementById("musica");

    audio.currentTime = 0;
    audio.play().catch(() => {
        alert("Activa el sonido del móvil 🔊");
    });
}

</script>

</body>
</html>
